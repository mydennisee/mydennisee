<svg viewBox="0 0 800 134" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse"><polygon points="0,0 7,3.5 0,7" fill="#4b5563"/></marker>
</defs>
<rect width="800" height="134" rx="8" fill="#0d1117"/>
<!-- N1 blue -->
<rect x="15" y="17" width="130" height="50" rx="6" fill="#0a1d35" stroke="#4d9de0" stroke-width="1.5"/>
<text x="80" y="38" fill="#4d9de0" font-size="10.5" font-weight="600" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Base Model</text>
<text x="80" y="52" fill="#4d9de0" font-size="10.5" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Selection</text>
<line x1="146" y1="42" x2="171" y2="42" stroke="#4b5563" stroke-width="1.5" marker-end="url(#a)"/>
<!-- N2 dark -->
<rect x="175" y="17" width="130" height="50" rx="6" fill="#161b22" stroke="rgba(77,157,224,0.25)" stroke-width="1"/>
<text x="240" y="38" fill="#9da3b4" font-size="10.5" font-weight="600" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Dataset</text>
<text x="240" y="52" fill="#9da3b4" font-size="10.5" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Curation</text>
<line x1="306" y1="42" x2="331" y2="42" stroke="#4b5563" stroke-width="1.5" marker-end="url(#a)"/>
<!-- N3 dark -->
<rect x="335" y="17" width="130" height="50" rx="6" fill="#161b22" stroke="rgba(77,157,224,0.25)" stroke-width="1"/>
<text x="400" y="38" fill="#9da3b4" font-size="10.5" font-weight="600" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">LoRA / QLoRA</text>
<text x="400" y="52" fill="#9da3b4" font-size="10.5" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Fine-tuning</text>
<line x1="466" y1="42" x2="491" y2="42" stroke="#4b5563" stroke-width="1.5" marker-end="url(#a)"/>
<!-- N4 dark -->
<rect x="495" y="17" width="130" height="50" rx="6" fill="#161b22" stroke="rgba(77,157,224,0.25)" stroke-width="1"/>
<text x="560" y="38" fill="#9da3b4" font-size="10.5" font-weight="600" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Benchmark &amp;</text>
<text x="560" y="52" fill="#9da3b4" font-size="10.5" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Evaluation</text>
<line x1="626" y1="42" x2="651" y2="42" stroke="#4b5563" stroke-width="1.5" marker-end="url(#a)"/>
<!-- N5 green -->
<rect x="655" y="17" width="130" height="50" rx="6" fill="#0d2818" stroke="#5bcc78" stroke-width="1.5"/>
<text x="720" y="38" fill="#5bcc78" font-size="10.5" font-weight="600" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Optimise &amp;</text>
<text x="720" y="52" fill="#5bcc78" font-size="10.5" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Deploy</text>
<!-- Feedback arc: N5 → N3 -->
<path d="M 720,68 C 720,108 400,108 400,71" stroke="#4b5563" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#a)"/>
<text x="560" y="121" fill="#6b7280" font-size="9.5" font-style="italic" text-anchor="middle" font-family="Inter,'Segoe UI',system-ui,sans-serif">Refine</text>
